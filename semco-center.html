document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1b\">1b<\u002Fa>הדמיית עמוד תוצאות גוגל — לחצו על ביטוי וראו איפה סמקו מדורגת + סקירת AI<\u002Fdiv>\n<div class=\"dv-card\" style=\"width:720px;direction:rtl\">\n\n  <div style=\"padding:26px 30px;background:linear-gradient(115deg,#0EA5B7,#0F3D5C);color:#fff\">\n    <div style=\"display:flex;gap:8px;margin-bottom:12px\">\n      <span style=\"background:rgba(255,255,255,.16);font-size:11px;font-weight:800;padding:5px 12px;border-radius:999px\">חוויה אינטראקטיבית<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-size:26px;font-weight:900;margin:0 0 6px\">איפה סמקו מופיעה בגוגל?<\u002Fh1>\n    <p style=\"margin:0;font-size:14px;color:rgba(255,255,255,.85)\">בחרו מילת חיפוש וצפו בעמוד התוצאות האמיתי — כולל היכן שאתם מדורגים.<\u002Fp>\n  <\u002Fdiv>\n\n  <div style=\"padding:18px 26px 4px;display:flex;flex-wrap:wrap;gap:8px\">\n    <sc-for list=\"{{ rows }}\" as=\"row\" hint-placeholder-count=\"10\">\n      <button onclick=\"{{ row.select }}\" style=\"cursor:pointer;padding:7px 13px;border-radius:999px;font-size:13px;font-weight:600;font-family:'Heebo',sans-serif;background:{{ row.chipBg }};color:{{ row.chipFg }};border:1.5px solid {{ row.chipBorder }};transition:all .15s\">{{ row.kw }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"padding:20px 30px 30px;background:#fff\">\n    <div style=\"display:flex;align-items:center;gap:12px;border:1px solid #E2E8F0;border-radius:999px;padding:12px 20px;box-shadow:0 1px 6px rgba(15,23,42,.06);max-width:440px\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#94A3B8\" stroke-width=\"2\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"M21 21l-4.3-4.3\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n      <span style=\"font-size:15px;color:#0F172A;font-weight:500\">{{ curKw }} ישראל<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:18px;border:1px solid #C7EEF3;background:linear-gradient(135deg,#F0FBFC,#ffffff);border-radius:16px;padding:16px 18px\">\n      <div style=\"display:flex;align-items:center;gap:8px;margin-bottom:8px\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"#0EA5B7\"><path d=\"M12 2l2.4 6.9L21 11l-6.6 2.1L12 20l-2.4-6.9L3 11l6.6-2.1z\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-weight:800;font-size:13px;color:#0E7C8C\">סקירת AI מבית Google<\u002Fspan>\n      <\u002Fdiv>\n      <p style=\"margin:0 0 10px;font-size:14px;line-height:1.6;color:#334155\">בין המקורות המובילים שהבינה המלאכותית מציגה עבור <b>\"{{ curKw }}\"<\u002Fb> — סמקו סנטר, כספק מוביל לחלקי חילוף מקוריים למזגנים בישראל.<\u002Fp>\n      <span style=\"display:inline-flex;align-items:center;gap:5px;background:#0EA5B7;color:#fff;font-size:12px;font-weight:700;padding:4px 12px;border-radius:999px\">סמקו סנטר ✓<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:20px;display:flex;flex-direction:column;gap:20px\">\n      <sc-for list=\"{{ serp }}\" as=\"r\" hint-placeholder-count=\"4\">\n        <sc-if value=\"{{ r.isUs }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"position:relative;max-width:560px;border:2px solid #0EA5B7;background:#F0FBFC;border-radius:14px;padding:15px 17px;box-shadow:0 12px 30px -12px rgba(14,165,183,.5);animation:popin .35s ease\">\n            <span style=\"position:absolute;top:-11px;inset-inline-start:16px;background:#0EA5B7;color:#fff;font-size:11px;font-weight:800;padding:3px 11px;border-radius:999px\">אתם כאן · מקום {{ r.rank }}<\u002Fspan>\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\">\n              <div style=\"width:28px;height:28px;border-radius:999px;background:#0F3D5C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px\">ס<\u002Fdiv>\n              <div><div style=\"font-size:14px;color:#202124;font-weight:600\">{{ r.site }}<\u002Fdiv><div style=\"font-size:12px;color:#5f6368\">{{ r.url }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"color:#0b57d0;font-size:19px;font-weight:500;line-height:1.3;margin:2px 0 4px\">{{ r.title }}<\u002Fdiv>\n            <div style=\"color:#4d5156;font-size:14px;line-height:1.55\">{{ r.snippet }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ r.notUs }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"max-width:560px;opacity:.85\">\n            <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:4px\">\n              <div style=\"width:28px;height:28px;border-radius:999px;background:#E2E8F0;color:#64748B;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px\">{{ r.initial }}<\u002Fdiv>\n              <div><div style=\"font-size:14px;color:#202124\">{{ r.site }}<\u002Fdiv><div style=\"font-size:12px;color:#5f6368\">{{ r.url }}<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"color:#1a0dab;font-size:19px;font-weight:400;line-height:1.3;margin:2px 0 4px\">{{ r.title }}<\u002Fdiv>\n            <div style=\"color:#4d5156;font-size:14px;line-height:1.55\">{{ r.snippet }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ OPTION 1c — COLORFUL RANKING MAP ============ -->\n<div class=\"dv-opt\" id=\"1c\">\n<div class=\"dv-olabel\"><a class=\"dv-oid\" href=\"#1c\">1c<\u002Fa>מפת דירוגים — קיבוץ ויזואלי צבעוני של כל הביטויים לפי מיקום<\u002Fdiv>\n<div class=\"dv-card\" style=\"width:720px;direction:rtl\">\n\n  <div style=\"padding:30px 34px 26px;background:#0F3D5C;color:#fff;position:relative;overflow:hidden\">\n    <div style=\"position:absolute;bottom:-60px;right:-30px;width:220px;height:220px;background:radial-gradient(circle,rgba(14,165,183,.5),transparent 70%);border-radius:50%\"><\u002Fdiv>\n    <div style=\"position:relative;z-index:1\">\n      <h1 style=\"font-size:26px;font-weight:900;margin:0 0 16px\">מפת הדירוגים של סמקו סנטר<\u002Fh1>\n      <div style=\"display:flex;gap:22px\">\n        <div><div style=\"font-size:38px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;color:#FFD86B\">{{ counts.first }}<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.8);margin-top:4px\">במקום 1<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:1px;background:rgba(255,255,255,.2)\"><\u002Fdiv>\n        <div><div style=\"font-size:38px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1\">{{ counts.total }}<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.8);margin-top:4px\">בעמוד הראשון<\u002Fdiv><\u002Fdiv>\n        <div style=\"width:1px;background:rgba(255,255,255,.2)\"><\u002Fdiv>\n        <div><div style=\"font-size:38px;font-weight:800;font-family:'JetBrains Mono',monospace;line-height:1;color:#7EE8D5\">{{ counts.ai }}%<\u002Fdiv><div style=\"font-size:12px;color:rgba(255,255,255,.8);margin-top:4px\">ב-AI<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"padding:24px 26px;display:flex;flex-direction:column;gap:14px;background:#F8FAFC\">\n    <sc-for list=\"{{ groups }}\" as=\"g\" hint-placeholder-count=\"5\">\n      <div style=\"background:#fff;border:1px solid #EEF2F5;border-radius:16px;overflow:hidden;box-shadow:0 2px 8px -4px rgba(15,23,42,.15)\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #F1F5F9\">\n          <span style=\"width:34px;height:34px;border-radius:11px;background:{{ g.color }};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:'JetBrains Mono',monospace\">{{ g.pos }}<\u002Fspan>\n          <span style=\"font-weight:800;color:#0F172A;font-size:16px\">{{ g.label }}<\u002Fspan>\n          <span style=\"margin-inline-start:auto;background:#F1F5F9;color:#475569;font-weight:700;font-size:12.5px;padding:3px 11px;border-radius:999px\">{{ g.count }} ביטויים<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px\">\n          <sc-for list=\"{{ g.items }}\" as=\"it\" hint-placeholder-count=\"3\">\n            <span style=\"padding:7px 12px;border-radius:10px;font-size:13px;font-weight:600;color:{{ it.color }};background:#F8FAFC;border:1px solid #EEF2F5\">{{ it.kw }}<\u002Fspan>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<p class=\"dv-next\">אפשר להמשיך: \"תפתח את 1a לרוחב מלא\" · \"ב-1b תוסיף מונה קליקים / מעברי מקלדת\" · \"תמזג את גרף ההתפלגות מ-1a לתוך 1c\" · \"כיוונים חדשים לגמרי\"<\u002Fp>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;playAnimations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;התנהגות&quot;}}\">\nclass Component extends DCLogic {\n  state = { mounted:false, counts:{first:0,total:0,ai:0}, selected:0, fltPos:'all', query:'', sortAsc:true };\n\n  componentDidMount(){\n    const play = this.props.playAnimations ?? true;\n    if(!play){ this.setState({ mounted:true, counts:{first:5,total:17,ai:100} }); return; }\n    requestAnimationFrame(()=> this.setState({ mounted:true }));\n    const dur=1500, start=performance.now(), tg={first:5,total:17,ai:100};\n    const tick=(now)=>{\n      const t=Math.min(1,(now-start)/dur), e=1-Math.pow(1-t,3);\n      this.setState({ counts:{ first:Math.round(tg.first*e), total:Math.round(tg.total*e), ai:Math.round(tg.ai*e) } });\n      if(t<1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  renderVals(){\n    // ===== נתונים — לעריכה קלה: מילה + מיקום בלבד =====\n    const data = [\n      { kw:'מנוע למזגן', pos:1 },\n      { kw:'תרמוסטט למזגן', pos:1 },\n      { kw:'מכשיר שטיפה למזגן', pos:1 },\n      { kw:'ערכת שטיפה למזגן', pos:1 },\n      { kw:'כיסוי לשטיפת מזגנים', pos:1 },\n      { kw:'מאיץ למזגן', pos:2 },\n      { kw:'חלקי חילוף למזגן', pos:2 },\n      { kw:'חומר ניקוי למזגן', pos:2 },\n      { kw:'קבל מזגן', pos:3 },\n      { kw:'חלפים למזגן', pos:3 },\n      { kw:'גרניק נטען', pos:3 },\n      { kw:'מעיל לשטיפת מזגנים', pos:3 },\n      { kw:'שלט מקורי למזגן', pos:4 },\n      { kw:'כרטיס פיקוד למזגן', pos:4 },\n      { kw:'חומר חיטוי למזגן', pos:4 },\n      { kw:'ספרי למזגן', pos:4 },\n      { kw:'מדחס למזגן', pos:6 },\n    ];\n    const posColor = {1:'#F5B301',2:'#0EA5B7',3:'#2563EB',4:'#7C3AED',5:'#EC4899',6:'#64748B'};\n    const medal = {1:'🥇',2:'🥈',3:'🥉'};\n    const m = this.state.mounted;\n    const sel = this.state.selected ?? 0;\n\n    const rows = data.map((d,i)=>{\n      const score = 100 - (d.pos-1)*12;\n      const c = posColor[d.pos] || '#64748B';\n      const top3 = d.pos <= 3;\n      const active = sel === i;\n      return {\n        i, kw:d.kw, pos:d.pos, page:1, score, color:c,\n        medal: medal[d.pos] || '',\n        posLabel: 'מיקום ' + d.pos,\n        fillW: (m ? score : 0) + '%',\n        pillBg: top3 ? c : '#EEF2F5',\n        pillFg: top3 ? '#fff' : '#475569',\n        pillBorder: top3 ? c : '#E2E8F0',\n        select: ()=> this.setState({ selected:i }),\n        chipBg: active ? c : '#fff',\n        chipFg: active ? '#fff' : '#334155',\n        chipBorder: active ? c : '#E2E8F0',\n      };\n    });\n\n    const order = [1,2,3,4,6];\n    const maxCount = 5;\n    const dist = order.map(p=>{\n      const count = rows.filter(r=>r.pos===p).length;\n      return { pos:p, count, label:'מיקום '+p, color:posColor[p], barW:(m ? (count/maxCount*100) : 0)+'%' };\n    });\n    const groups = order.map(p=>({\n      pos:p, label:'מיקום '+p, color:posColor[p],\n      items: rows.filter(r=>r.pos===p),\n      count: rows.filter(r=>r.pos===p).length,\n    }));\n\n    // ===== SERP simulator =====\n    const cur = rows[sel] || rows[0];\n    const comps = ['מזגנים אונליין','חלפים ישיר','קול-אייר מיזוג','ספיר מיזוג','טק-קליים','אייר פארטס','מיזוג פלוס'];\n    const total = cur.pos + 2;\n    const serp = [];\n    let cp = 0;\n    for(let p=1; p<=total; p++){\n      if(p === cur.pos){\n        serp.push({ rank:p, isUs:true, notUs:false, site:'סמקו סנטר', initial:'ס',\n          url:'semcocenter.co.il › '+cur.kw,\n          title: cur.kw+' | סמקו סנטר – חלקי חילוף מקוריים למזגנים',\n          snippet:'מבחר '+cur.kw+' במלאי מיידי, משלוח לכל הארץ ואחריות יצרן מלאה. סמקו סנטר – המומחים לחלקי חילוף למזגנים.' });\n      } else {\n        const n = comps[cp % comps.length]; cp++;\n        serp.push({ rank:p, isUs:false, notUs:true, site:n, initial:n.charAt(0),\n          url: n.replace(/\\s/g,'-')+'.co.il',\n          title: cur.kw+' – '+n,\n          snippet:'מידע כללי על '+cur.kw+', מוצרים דומים והשוואת מחירים אצל ספקים נוספים.' });\n      }\n    }\n\n    // ===== 2a — interactive dashboard: filter + search + sort =====\n    const fltPos = this.state.fltPos ?? 'all';\n    const query = this.state.query ?? '';\n    const sortAsc = this.state.sortAsc ?? true;\n    const filterChips = [{key:'all',label:'הכל'}, ...order.map(p=>({key:p,label:'מיקום '+p}))].map(f=>{\n      const active = fltPos === f.key;\n      const color = f.key==='all' ? '#0F3D5C' : posColor[f.key];\n      return { key:f.key, label:f.label, active, color,\n        chipBg: active ? color : '#fff',\n        chipFg: active ? '#fff' : '#475569',\n        chipBorder: active ? color : '#E2E8F0',\n        onClick: ()=> this.setState({ fltPos:f.key }) };\n    });\n    const q = query.trim();\n    let viewRows = rows.filter(r => (fltPos==='all' || r.pos===fltPos) && (q==='' || r.kw.includes(q)));\n    viewRows = viewRows.slice().sort((a,b)=> sortAsc ? a.pos-b.pos : b.pos-a.pos);\n    const distI = dist.map(d=>({ ...d, active: fltPos===d.pos,\n      dimOpacity: (fltPos!=='all' && fltPos!==d.pos) ? 0.4 : 1,\n      onClick: ()=> this.setState({ fltPos: (fltPos===d.pos ? 'all' : d.pos) }) }));\n    const setQuery = (e)=> this.setState({ query: e.target.value });\n    const toggleSort = ()=> this.setState({ sortAsc: !sortAsc });\n    const sortArrow = sortAsc ? '↑' : '↓';\n    const shown = viewRows.length;\n    const isEmpty = shown === 0;\n\n    return { counts:this.state.counts, rows, dist, groups, serp, curKw:cur.kw,\n      filterChips, viewRows, distI, setQuery, query, toggleSort, sortArrow, shown, total17:rows.length, isEmpty };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
